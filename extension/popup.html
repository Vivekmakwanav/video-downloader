<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      font-family: Arial, sans-serif;
      background: #0f0f15;
      color: #fff;
      margin: 0;
      padding: 16px;
      text-align: center;
    }
    h3 {
      margin-top: 0;
      font-size: 1.1rem;
      background: linear-gradient(90deg, #00f0ff, #8a2be2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    p {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 12px;
    }
    button {
      background: linear-gradient(90deg, #00f0ff, #8a2be2);
      border: none;
      color: #000;
      padding: 8px 16px;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h3>VISNEXA DOWNLOADER</h3>
  <p>Open current YouTube video in Visnexa</p>
  <button id="open-btn">Download This Video</button>
  <script src="popup.js"></script>
</body>
</html>
